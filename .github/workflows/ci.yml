name: CI Pipeline - Build and Push

# 1. THE TRIGGER: When should this run?
on:
  push:
    branches:
      - main # Only run when code is pushed to the main branch

# 2. THE JOBS: What should the robot do?
jobs:
  build:
    runs-on: ubuntu-latest # GitHub gives you a temporary Ubuntu server for free!

    steps:
      # Step A: Download your code onto the temporary server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Log into Docker Hub using the secrets we saved
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build the Dockerfile and push it to your Docker Hub account
      - name: Build and Push Flask Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myapp-flask:latest
